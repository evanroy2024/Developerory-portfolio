<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developeroy / work</title>
    <link rel="icon" type="image/png" href="img/faviocn.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --brand-green: #4ade80; 
            --accent-soft: rgba(74, 222, 128, 0.2);
            --bg-color: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            height: 100vh;
        }

        /* --- IMMERSIVE BACKGROUND --- */
        .ambient-glow {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, var(--accent-soft) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, var(--accent-soft) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(0,0,0,1) 0%, transparent 100%);
            pointer-events: none;
            z-index: 1;
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #redirect-overlay {
            position: fixed;
            inset: 0;
            background: var(--brand-green);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            clip-path: circle(0% at 50% 50%);
            pointer-events: none;
        }

        .ui-frame {
            position: fixed;
            inset: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 100;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }
        @media (min-width: 1024px) { .ui-frame { inset: 15px; } }

        .mono { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.15em; }

        .sidebar { 
            width: 80px; border-right: 1px solid rgba(255,255,255,0.1); 
            height: 100%; display: none; flex-direction: column; 
            align-items: center; padding-top: 130px; gap: 45px; 
            pointer-events: auto;
        }
        @media (min-width: 1024px) { .sidebar { display: flex; } }

        .sidebar-icon {
            width: 24px; height: 24px; color: rgba(255,255,255,0.2);
            transition: all 0.3s ease; cursor: pointer;
        }
        .sidebar-icon:hover, .sidebar-icon.active { color: var(--brand-green); transform: scale(1.2); }

        #mobile-fullscreen-menu {
            position: fixed; inset: 0; background: #050505; z-index: 4000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 40px; transform: translateX(100%); transition: transform 0.4s ease-in-out;
        }
        #mobile-fullscreen-menu.active { transform: translateX(0); }

        .bottom-bar { 
            height: 50px; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            pointer-events: auto; 
            background: rgba(5,5,5,0.85); 
            backdrop-filter: blur(15px);
            font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase;
        }

        .grid-container {
            flex: 1; display: grid; grid-template-columns: 1fr;
            align-items: center; padding: 20px 5%; z-index: 10;
        }
        @media (min-width: 1024px) { .grid-container { grid-template-columns: 1.1fr 0.9fr; } }

        #bg-number {
            position: fixed; top: 45%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Orbitron'; font-size: 40vw; font-weight: 900;
            color: var(--brand-green); opacity: 0.05; z-index: 0; pointer-events: none;
        }

        .perspective-stage { perspective: 2000px; display: flex; justify-content: center; pointer-events: auto; }
        .card-3d { width: 280px; height: 380px; position: relative; transform-style: preserve-3d; cursor: pointer; }
        @media (min-width: 1024px) { .card-3d { width: 380px; height: 500px; } }

        .card-inner {
            position: absolute; inset: 0; background: linear-gradient(135deg, var(--brand-green), transparent);
            border-radius: 24px; padding: 1.5px; transform-style: preserve-3d;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .card-face { background: #080808; width: 100%; height: 100%; border-radius: 23px; overflow: hidden; position: relative; transform-style: preserve-3d; }
        .main-card-image {
            position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;
            filter: brightness(0.6) grayscale(0.5); transition: 0.6s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .hover-btn {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) translateZ(80px);
            background: var(--brand-green); color: black;
            padding: 12px 24px; font-weight: 900; font-size: 10px;
            letter-spacing: 2px; border-radius: 2px; opacity: 0; transition: all 0.3s ease;
        }
        .card-3d:hover .hover-btn { opacity: 1; }

        .live-demo-link {
            display: inline-flex; align-items: center; gap: 12px;
            padding: 14px 30px; background: var(--brand-green);
            color: #000; font-weight: 900; font-size: 10px;
            text-transform: uppercase; letter-spacing: 2px;
            transition: all 0.3s; pointer-events: auto;
        }

        #project-modal {
            position: fixed; inset: 0; background: rgba(5,5,5,0.98);
            backdrop-filter: blur(20px); z-index: 5000;
            display: none; opacity: 0; align-items: center; justify-content: center;
            padding: 20px; pointer-events: auto;
        }

        .btn-exit {
            position: absolute; top: 20px; right: 20px;
            border: 1px solid var(--brand-green); color: var(--brand-green);
            padding: 10px 20px; font-size: 10px; letter-spacing: 2px;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent; z-index: 100;
        }
        .btn-exit:hover { background: var(--brand-green); color: black; box-shadow: 0 0 20px var(--brand-green); }

        .deck-container {
            position: fixed; bottom: 65px; left: 50%; transform: translateX(-50%);
            display: flex; justify-content: center; align-items: flex-end;
            height: 100px; z-index: 200; pointer-events: auto;
        }

        .mini-card {
            width: 50px; height: 70px; background: #111; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px; margin: 0 -10px; transition: 0.4s; cursor: pointer; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        @media (min-width: 1024px) { .mini-card { width: 80px; height: 110px; margin: 0 -12px; } }
        .mini-card:hover { transform: translateY(-20px) scale(1.1) !important; border-color: var(--brand-green); z-index: 100; }
        .mini-card.active { border-color: var(--brand-green); transform: translateY(-10px) !important; }
        .mini-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .mini-card.active img { opacity: 1; }

        #cursor-dot {
            position: fixed; width: 8px; height: 8px; background: var(--brand-green);
            border-radius: 50%; pointer-events: none; z-index: 10000;
            box-shadow: 0 0 15px var(--brand-green); display: none;
        }
        @media (min-width: 1024px) { #cursor-dot { display: block; } }
    </style>
</head>
<body>

<div id="redirect-overlay"><div class="glitch-text uppercase font-black tracking-widest" id="overlay-text" style="font-size: 2.5rem;">LOADING</div></div>
<div class="ambient-glow" id="ambient-glow"></div>
<div id="cursor-dot"></div>
<div id="bg-number">01</div>

<div id="mobile-fullscreen-menu" class="mono">
    <a href="javascript:void(0)" onclick="handleNavigation('main.html', 'HOME')" class="text-white text-2xl mb-6 hover:text-green-400">HOME</a>
    <a href="javascript:void(0)" onclick="handleNavigation('services.html', 'SERVICES')" class="text-white text-2xl mb-6 hover:text-green-400">SERVICES</a>
    <a href="javascript:void(0)" onclick="handleNavigation('cards.html', 'WORK')" class="text-green-400 text-2xl mb-6">WORK</a>
    <a href="javascript:void(0)" onclick="handleNavigation('contact.html', 'CONTACT')" class="text-white text-2xl mb-6 hover:text-green-400">CONTACT</a>
    <button onclick="toggleMenu()" class="mt-10 text-white/30 text-sm tracking-widest">[ CLOSE_PROTOCOL ]</button>
</div>

<div id="project-modal">
    <button class="btn-exit mono uppercase font-bold" onclick="closeModal()">[ Exit_Proposal ]</button>
    <div class="grid grid-cols-1 lg:grid-cols-2 w-full max-w-7xl items-center gap-8 lg:gap-12">
        <div class="flex justify-center">
            <img src="" id="modal-main-img" class="w-full max-w-xs lg:max-w-lg rounded-2xl shadow-2xl">
        </div>
        <div class="text-center lg:text-left">
            <div class="mono text-brand-green mb-2 text-lg lg:text-xl" id="modal-index">01</div>
            <h2 class="text-4xl lg:text-8xl font-black font-['Orbitron'] leading-tight mb-4 lg:mb-8" id="modal-title">TITLE</h2>
            <p class="text-white/50 text-[10px] lg:text-sm uppercase tracking-widest mb-8 lg:mb-12 max-w-md mx-auto lg:mx-0" id="modal-desc">Description</p>
            <a href="#" id="modal-link" target="_blank" class="live-demo-link">Live Demo <i data-lucide="arrow-up-right" class="w-4 h-4"></i></a>
        </div>
    </div>
</div>

<div class="ui-frame">
    <div class="flex justify-between items-center px-4 lg:px-8 py-4 lg:py-5 border-b border-white/10 mono uppercase pointer-events-auto">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 lg:w-10 lg:h-10 bg-white flex items-center justify-center rounded-sm" id="logo-box">
                <span class="text-black font-black text-[14px] lg:text-[18px]">R</span>
            </div>
            <span class="hidden md:block text-[10px] opacity-40">DEVELOPERROY / WORK</span>
        </div>
        <div class="tracking-[0.2em] font-medium text-[9px] lg:text-sm">Production <span class="text-brand-green font-bold">&lt;Works&gt;</span></div>
        <button onclick="toggleMenu()" class="pointer-events-auto p-1"><i data-lucide="menu" class="w-5 h-5 lg:w-6 lg:h-6"></i></button>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <div class="sidebar">
            <a href="javascript:void(0)" onclick="handleNavigation('main.html', 'HOME')"><i data-lucide="home" class="sidebar-icon"></i></a>
            <a href="javascript:void(0)" onclick="handleNavigation('services.html', 'SERVICES')"><i data-lucide="layers" class="sidebar-icon"></i></a>
            <a href="javascript:void(0)" onclick="handleNavigation('cards.html', 'WORK')"><i data-lucide="cpu" class="sidebar-icon active"></i></a>
            <a href="javascript:void(0)" onclick="handleNavigation('contact.html', 'CONTACT')"><i data-lucide="mail" class="sidebar-icon"></i></a>
        </div>

        <div class="grid-container">
            <div class="perspective-stage">
                <div class="card-3d" onclick="openModal()">
                    <div class="card-inner" id="card-inner-target">
                        <div class="card-face">
                            <img src="" id="card-main-image" class="main-card-image">
                            <div class="hover-btn mono font-bold">LIVE_DEMO</div>
                            <div class="absolute bottom-6 left-6 lg:bottom-10 lg:left-10" style="transform: translateZ(50px)">
                                <div class="text-[8px] lg:text-[10px] text-brand-green font-bold tracking-[0.3em] uppercase mb-1 lg:mb-2" id="card-tag">Category</div>
                                <h3 class="text-xl lg:text-3xl font-black font-['Orbitron']" id="card-title">PROJECT</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="content-panel hidden lg:block pl-12">
                <div class="mono text-brand-green mb-4 text-lg font-bold" id="panel-index">01</div>
                <h2 class="text-6xl font-black font-['Orbitron'] mb-8 leading-tight" id="panel-title">TITLE</h2>
                <p class="text-white/50 text-xs leading-loose uppercase tracking-[0.2em] max-w-md mb-12" id="panel-desc">Description</p>
                <a href="#" id="main-demo-link" target="_blank" class="live-demo-link">Live Demo <i data-lucide="arrow-up-right" class="w-4 h-4"></i></a>
            </div>
        </div>
    </div>

    <div class="bottom-bar px-0 text-[8px] md:text-[10px]">
        <div class="flex items-center gap-2 md:gap-6 h-full">
            <div class="bg-brand-green/10 text-brand-green px-5 py-4 border-r border-white/10 self-stretch flex items-center font-bold">
                <i data-lucide="search" class="w-4 h-4 mr-2"></i> WORK
            </div>
            <span class="opacity-50 uppercase tracking-widest hidden sm:block">Core v5.0.1</span>
        </div>
        
        <div class="hidden lg:flex gap-12 uppercase opacity-40 tracking-[0.2em]">
            <span id="coord">GMT+1 // BOLOGNA</span>
            <span id="scroll-pct">NODE: 01/06</span>
        </div>

        <div class="flex items-center gap-4 md:gap-8 pr-8">
            <div class="flex gap-5 opacity-50">
                <a href="https://www.linkedin.com/in/papan-roy-778a94292" target="_blank">
                    <i data-lucide="linkedin" class="w-4 h-4 hover:text-brand-green cursor-pointer"></i>
                </a>
            </div>
            <button onclick="handleNavigation('contact.html', 'CONTACT US')" class="border border-white/20 px-3 md:px-6 py-2 transition-all font-bold uppercase tracking-[0.2em] text-[7px] md:text-[8px] hover:border-brand-green hover:text-brand-green">
                GET_IN_TOUCH &rarr;
            </button>
        </div>
    </div>
</div>

<div class="deck-container" id="deck"></div>

<script>
    lucide.createIcons();

    // Central Navigation Handler with Green Effect
    function handleNavigation(url, label) {
        const overlay = document.getElementById('redirect-overlay');
        const overlayText = document.getElementById('overlay-text');
        overlayText.innerText = label;
        
        gsap.to(overlay, { 
            clipPath: "circle(150% at 50% 50%)", 
            duration: 1.2, 
            ease: "power4.inOut",
            onComplete: () => {
                window.location.href = url;
            }
        });
    }

    const projects = [
        { title: "BREATHE<br>WITH ME", cardTitle: "BREATHEWITHME", tag: "Wellness / iOS", desc: "A premium mindfulness companion designed for deep stress relief. BreatheWithMe provides immersive guided sessions to optimize your mental state anywhere, anytime.", img: "img/1.png", color: "#4ade80", soft: "rgba(74, 222, 128, 0.25)", link: "https://apps.apple.com/us/app/breathewithme/id6741172979", btnText: "IOS APP" },
        { title: "WALKLIST<br>PRO", cardTitle: "WALKLISTPRO", tag: "Survey Tool", desc: "The ultimate survey application for professionals. WalkListPro streamlines data collection with a high-performance interface and real-time synchronization capabilities.", img: "img/2.png", color: "#3b82f6", soft: "rgba(59, 130, 246, 0.25)", link: "https://apps.apple.com/us/app/walk-list-pro/id6744178530", btnText: "IOS APP" },
        { title: "DN<br>ELECTRONICS", cardTitle: "DNELECTRONICS", tag: "E-Commerce", desc: "A robust electronic retail platform featuring seamless payment integration, intuitive product navigation, and high-speed architectural performance.", img: "img/3.png", color: "#f43f5e", soft: "rgba(244, 63, 94, 0.25)", link: "https://dnelectronicsshop.com/", btnText: "Live Website" },
        { title: "BREATHE<br>ANDROID", cardTitle: "BREATHEWITHME", tag: "Wellness / Android", desc: "The Android version of the premier mindfulness tool. Experience the same high-fidelity guided breathing exercises on the Google Play ecosystem.", img: "img/4.png", color: "#fbbf24", soft: "rgba(251, 191, 36, 0.25)", link: "https://play.google.com/store/apps/details?id=com.devroy.bwmapp", btnText: "Android App" },
        { title: "TASTE<br>PARADISE", cardTitle: "RESTAURANT", tag: "Food & Beverage", desc: "An immersive digital menu and brand experience for premium dining. Taste Paradise captures the essence of culinary art through visual elegance.", img: "img/5.png", color: "#a855f7", soft: "rgba(168, 85, 247, 0.25)", link: "https://erenroy.github.io/Reausturent-Essence/", btnText: "Live Website" },
        { title: "LOTUS<br>PROPERTY", cardTitle: "LOTUS PROPERTY", tag: "Real Estate", desc: "Comprehensive management suite for Lotus Property Management. Designed for internal operational efficiency and real estate asset tracking.", img: "img/6.png", color: "#06b6d4", soft: "rgba(6, 182, 212, 0.25)", link: "#", btnText: "( This is internal project of client cant be shared )" }
    ];

    let activeIdx = 0;
    const deck = document.getElementById('deck');
    const cursor = document.getElementById('cursor-dot');

    function toggleMenu() { document.getElementById('mobile-fullscreen-menu').classList.toggle('active'); }

    document.addEventListener('mousemove', (e) => {
        if(window.innerWidth > 1024) {
            gsap.to(cursor, { x: e.clientX - 4, y: e.clientY - 4, duration: 0.1 });
            const card = document.getElementById('card-inner-target');
            const rect = card.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            gsap.to(card, { rotationX: (e.clientY - centerY) / 20, rotationY: (centerX - e.clientX) / 20, duration: 0.6 });
        }
    });

    projects.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = `mini-card ${i === 0 ? 'active' : ''}`;
        div.style.transform = `rotate(${(i - 2.5) * 8}deg) translateY(${Math.abs(i - 2.5) * 10}px)`;
        div.innerHTML = `<img src="${p.img}">`;
        div.onclick = () => selectProject(i);
        deck.appendChild(div);
    });

    const contactCard = document.createElement('div');
    contactCard.className = "mini-card flex items-center justify-center bg-brand-green";
    contactCard.id = "deck-contact-card";
    contactCard.style.transform = `rotate(25deg) translateY(20px)`;
    contactCard.innerHTML = `<i data-lucide="send" class="w-6 h-6 lg:w-8 lg:h-8 text-black"></i>`;
    contactCard.onclick = () => handleNavigation('contact.html', 'CONTACT US');
    deck.appendChild(contactCard);

    function selectProject(idx) {
        activeIdx = idx;
        const p = projects[idx];
        document.querySelectorAll('.mini-card').forEach((c, i) => { if(i < projects.length) c.classList.toggle('active', i === idx); });

        gsap.to(".grid-container, #bg-number", { opacity: 0, duration: 0.3, onComplete: () => {
            document.documentElement.style.setProperty('--brand-green', p.color);
            document.documentElement.style.setProperty('--accent-soft', p.soft);
            document.getElementById('bg-number').style.color = p.color;
            document.getElementById('bg-number').innerText = `0${idx + 1}`;
            document.getElementById('logo-box').style.backgroundColor = p.color;
            document.getElementById('deck-contact-card').style.backgroundColor = p.color;
            document.getElementById('card-main-image').src = p.img;
            document.getElementById('card-title').innerText = p.cardTitle;
            document.getElementById('card-tag').innerText = p.tag;
            document.getElementById('panel-title').innerHTML = p.title;
            document.getElementById('panel-desc').innerText = p.desc;
            document.getElementById('panel-index').innerText = `0${idx + 1}`;
            document.getElementById('scroll-pct').innerText = `NODE: 0${idx + 1}/06`;
            const mainLink = document.getElementById('main-demo-link');
            mainLink.href = p.link;
            mainLink.innerHTML = `${p.btnText} <i data-lucide="arrow-up-right" class="w-4 h-4"></i>`;
            gsap.to(".grid-container, #bg-number", { opacity: 1, duration: 0.5 });
            lucide.createIcons();
        }});
    }

    function openModal() {
        const p = projects[activeIdx];
        const modal = document.getElementById('project-modal');
        document.getElementById('modal-main-img').src = p.img;
        document.getElementById('modal-title').innerHTML = p.title;
        document.getElementById('modal-desc').innerText = p.desc;
        document.getElementById('modal-index').innerText = `0${activeIdx + 1}`;
        const modalLink = document.getElementById('modal-link');
        modalLink.href = p.link;
        modalLink.innerHTML = `${p.btnText} <i data-lucide="arrow-up-right" class="w-4 h-4"></i>`;
        modal.style.display = 'flex';
        gsap.to(modal, { opacity: 1, duration: 0.5 });
        lucide.createIcons();
    }

    function closeModal() {
        gsap.to("#project-modal", { opacity: 0, duration: 0.4, onComplete: () => { document.getElementById('project-modal').style.display = 'none'; }});
    }

    selectProject(0);
</script>
</body>
</html>
